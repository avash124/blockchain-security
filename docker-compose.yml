version: "3.9"

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    entrypoint: ["anvil", "--host", "0.0.0.0", "--port", "8545"]
    ports:
      - "8545:8545"
    environment:
      - ANVIL_FORK_URL=${MAINNET_RPC_URL}
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-forensics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-forensics}
      POSTGRES_DB: ${POSTGRES_DB:-traces}
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
